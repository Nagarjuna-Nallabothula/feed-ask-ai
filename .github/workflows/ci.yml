name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        uses: gradle/gradle-build-action@v2

      - name: Set up Docker environment
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
          docker --version
          docker-compose --version

      - name: Start Docker containers with Gradle
        run: ./gradlew dockerComposeUp

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL container to be healthy..."
          for i in {1..60}; do
            if docker exec feed-ask-ai-mysql mysqladmin ping -h"localhost" -u"admin" -p"admin123" --silent > /dev/null 2>&1; then
              echo "MySQL is ready!"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/60)"
            sleep 2
          done
          echo "MySQL failed to start"
          docker logs feed-ask-ai-mysql
          exit 1

      - name: Wait for Ollama to be ready
        run: |
          echo "Waiting for Ollama container to be healthy..."
          for i in {1..60}; do
            if docker exec feed-ask-ai-ollama curl -f http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready!"
              exit 0
            fi
            echo "Waiting for Ollama... ($i/60)"
            sleep 2
          done
          echo "Ollama failed to start"
          docker logs feed-ask-ai-ollama
          exit 1

      - name: Verify containers are running
        run: |
          echo "=== Running Containers ==="
          docker ps
          echo ""
          echo "=== MySQL Status ==="
          docker exec feed-ask-ai-mysql mysql -u admin -p"admin123" -e "SELECT 1;" || true
          echo ""
          echo "=== Ollama Status ==="
          docker exec feed-ask-ai-ollama ollama list || true

      - name: Generate OpenAPI code
        run: ./gradlew openApiGenerate

      - name: Build project
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test --info

      - name: Generate build report
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Build completed at: $(date)"
          echo "Docker containers running:"
          docker ps

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-reports
          path: build/reports/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: build/test-results/

      - name: Stop Docker containers
        if: always()
        run: docker-compose down -v

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dependency check
        run: |
          chmod +x ./gradlew
          ./gradlew dependencyCheck || true
        continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  build-summary:
    runs-on: ubuntu-latest
    needs: [ build, security-scan, code-quality ]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║    CI Pipeline Execution Complete     ║"
          echo "╠════════════════════════════════════════╣"
          echo "║ Build Status: ${{ needs.build.result }}"
          echo "║ Security Scan: ${{ needs.security-scan.result }}"
          echo "║ Code Quality: ${{ needs.code-quality.result }}"
          echo "╚════════════════════════════════════════╝"
          echo ""
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All checks passed!"
            exit 0
          else
            echo "❌ Build failed!"
            exit 1
          fi

