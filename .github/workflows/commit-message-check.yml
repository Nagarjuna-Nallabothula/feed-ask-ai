name: Validate Commit Messages

on:
  pull_request:
    branches: [ main ]

jobs:
  commit-message-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          BRANCH="${{ github.head_ref }}"

          echo "🔍 Validating commit messages for branch: $BRANCH"

          git log --format="%s" origin/main..HEAD | while read -r COMMIT; do
            if [[ ! "$COMMIT" =~ ^${BRANCH}:\ .+\ -v[0-9]+\.[0-9]+$ ]]; then
              echo "❌ Invalid commit message: $COMMIT"
              echo "✅ Expected format: ${BRANCH}: <message> -vX.Y"
              exit 1
            fi
          done

          echo "✅ All commit messages are valid"