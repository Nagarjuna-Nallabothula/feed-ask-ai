name: Validate Commit Messages

on:
  pull_request:
    branches: [ main ]

jobs:
  commit-message-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          BRANCH="${{ github.head_ref }}"
          BASE_BRANCH="${{ github.base_ref }}"

          echo "🔍 Validating commit messages from $BASE_BRANCH to $BRANCH"

          git fetch origin "$BASE_BRANCH" "$BRANCH"

          COMMITS=$(git log --format="%s" origin/$BASE_BRANCH..origin/$BRANCH)

          if [ -z "$COMMITS" ]; then
            echo "✅ No new commits to validate"
            exit 0
          fi

          while IFS= read -r COMMIT; do
            echo "Checking: $COMMIT"

            if [[ ! "$COMMIT" =~ ^${BRANCH}:\ .+\ -v[0-9]+\.[0-9]+$ ]]; then
              echo "❌ Invalid commit message: $COMMIT"
              echo "✅ Expected format: ${BRANCH}: <message> -vX.Y"
              exit 1
            fi
          done <<< "$COMMITS"

          echo "✅ All commit messages are valid"
